version: "3.9"

services:
  job-agent:
    build: .
    container_name: job-agent
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - job-agent-data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  job-agent-data:
