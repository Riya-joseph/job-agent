# fly.toml — Fly.io configuration for AI Job Agent
# Docs: https://fly.io/docs/reference/configuration/

app = "job-agent"          # Change this to your chosen app name (must be globally unique on Fly)
primary_region = "sin"     # Singapore — closest free region to India
                           # Other options: bom (Mumbai, paid), blr (Bangalore, paid)
                           # Free regions: sin, nrt (Tokyo), syd (Sydney), iad (Virginia)

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  DB_PATH  = "/data/jobs.db"

# Secrets (set via CLI, never in this file):
#   fly secrets set ANTHROPIC_API_KEY=...
#   fly secrets set TELEGRAM_BOT_TOKEN=...
#   fly secrets set TELEGRAM_CHAT_ID=...
#   fly secrets set DIGEST_CRON="0 8 * * *"

[mounts]
  # Persistent volume for SQLite database
  # Created once with: fly volumes create job_agent_data --size 1
  source      = "job_agent_data"
  destination = "/data"

[[services]]
  # The bot uses Telegram polling (outbound only) — no inbound HTTP needed.
  # We define a minimal internal check so Fly knows the process is healthy.
  internal_port = 8080
  protocol      = "tcp"

  [[services.tcp_checks]]
    interval    = "30s"
    timeout     = "5s"
    grace_period = "10s"

[checks]
  [checks.alive]
    type     = "tcp"
    port     = 8080
    interval = "60s"
    timeout  = "5s"

[[vm]]
  # Free tier: shared-cpu-1x with 256MB RAM
  size   = "shared-cpu-1x"
  memory = "256mb"
