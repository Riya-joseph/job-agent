# fly.toml app configuration file generated for job-agent on 2026-06-15T18:38:32+05:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'job-agent'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[env]
  DB_PATH = '/data/jobs.db'
  NODE_ENV = 'production'

[[mounts]]
  source = 'job_agent_data'
  destination = '/data'

[[services]]
  protocol = 'tcp'
  internal_port = 8080
  ports = []

  [[services.tcp_checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'

[checks]
  [checks.alive]
    port = 8080
    type = 'tcp'
    interval = '1m0s'
    timeout = '5s'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
