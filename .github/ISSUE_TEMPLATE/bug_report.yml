name: Bug Report
description: Something isn't working
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug clearly
      placeholder: e.g. /digest command returns no jobs even though profile is set
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any error output from `docker-compose logs`
      render: shell

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment method
      options:
        - Docker (docker-compose)
        - Node directly (npm start)
        - Railway
        - Render
        - Other VPS
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: e.g. 20.14.0
